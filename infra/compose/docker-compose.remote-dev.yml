services:
  orchestrator-api:
    container_name: lummevia-orchestrator-api-remote-dev
    build:
      context: ../..
      dockerfile: infra/docker/orchestrator-api.Dockerfile
    network_mode: host
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_PORT: ${APP_PORT:-8000}
      APP_NAME: ${APP_NAME:-lummevia-orchestrator-api}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8000}
      PUBLIC_API_URL: ${PUBLIC_API_URL:-}
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: ${SSH_TUNNEL_POSTGRES_LOCAL_PORT:-15432}
      POSTGRES_DB: ${POSTGRES_DB:-lummevia}
      POSTGRES_USER: ${POSTGRES_USER:-lummevia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lummevia}
      RUNTIME_PERSISTENCE_ENABLED: ${RUNTIME_PERSISTENCE_ENABLED:-false}
      RUNTIME_DATABASE_URL: ${RUNTIME_DATABASE_URL:-}
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: ${SSH_TUNNEL_REDIS_LOCAL_PORT:-16379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      PHOENIX_ENABLED: ${REMOTE_DEV_PHOENIX_ENABLED:-false}
      PHOENIX_HOST: ${PHOENIX_HOST:-phoenix}
      PHOENIX_PORT: ${PHOENIX_PORT:-6006}
      PHOENIX_BASE_URL: ${PHOENIX_BASE_URL:-http://phoenix:6006}
      YOUTRACK_ENABLED: ${YOUTRACK_ENABLED:-false}
      YOUTRACK_BASE_URL: ${YOUTRACK_BASE_URL:-}
      YOUTRACK_TOKEN: ${YOUTRACK_TOKEN:-}
      YOUTRACK_PROJECT_ID: ${YOUTRACK_PROJECT_ID:-}
      YOUTRACK_DEFAULT_ASSIGNEE: ${YOUTRACK_DEFAULT_ASSIGNEE:-}
      TELEGRAM_ENABLED: ${TELEGRAM_ENABLED:-false}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-}
      TELEGRAM_ALLOWED_CHAT_IDS: ${TELEGRAM_ALLOWED_CHAT_IDS:-}
      DEEPSEEK_ENABLED: ${DEEPSEEK_ENABLED:-false}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_TIMEOUT_SECONDS: ${DEEPSEEK_TIMEOUT_SECONDS:-60}
      MODEL_PM_PROVIDER: ${MODEL_PM_PROVIDER:-DEEPSEEK}
      MODEL_PM_NAME: ${MODEL_PM_NAME:-deepseek-chat}
      MODEL_PO_PROVIDER: ${MODEL_PO_PROVIDER:-DEEPSEEK}
      MODEL_PO_NAME: ${MODEL_PO_NAME:-deepseek-v4-strong-placeholder}
      MODEL_DEV_PROVIDER: ${MODEL_DEV_PROVIDER:-DEEPSEEK}
      MODEL_DEV_NAME: ${MODEL_DEV_NAME:-deepseek-v4-lite-placeholder}
      MODEL_QA_PROVIDER: ${MODEL_QA_PROVIDER:-DEEPSEEK}
      MODEL_QA_NAME: ${MODEL_QA_NAME:-deepseek-v4-lite-placeholder}
      MODEL_QC_PROVIDER: ${MODEL_QC_PROVIDER:-DEEPSEEK}
      MODEL_QC_NAME: ${MODEL_QC_NAME:-deepseek-v4-qc-placeholder}
      KILO_ENABLED: ${KILO_ENABLED:-false}
      KILO_DRY_RUN: ${KILO_DRY_RUN:-true}
      KILO_CLI_PATH: ${KILO_CLI_PATH:-}
      KILO_WORKSPACE_ROOT: ${KILO_WORKSPACE_ROOT:-}
      KILO_DEFAULT_TIMEOUT_SECONDS: ${KILO_DEFAULT_TIMEOUT_SECONDS:-300}
      KILO_ALLOWED_REPOS: ${KILO_ALLOWED_REPOS:-}
      KILO_MAX_OUTPUT_BYTES: ${KILO_MAX_OUTPUT_BYTES:-32768}
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
