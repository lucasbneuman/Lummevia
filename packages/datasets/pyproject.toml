[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "lummevia-datasets"
version = "0.1.0"
description = "Prompt regression datasets for Lummevia OS."
requires-python = ">=3.12"
dependencies = [
    "pydantic==2.11.4",
]

[tool.setuptools]
packages = ["lummevia_datasets"]

[tool.setuptools.package-data]
lummevia_datasets = ["fixtures/*.json"]
