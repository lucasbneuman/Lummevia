[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "lummevia-economics"
version = "0.1.0"
description = "Deterministic operational economics and cost-control primitives for Lummevia OS."
requires-python = ">=3.12"
dependencies = [
    "pydantic==2.11.4",
]

[tool.setuptools]
packages = ["lummevia_economics"]
