[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "lummevia-agents"
version = "0.1.0"
description = "Agent skeletons for Lummevia OS."
requires-python = ">=3.12"
dependencies = [
    "pydantic==2.11.4",
    "lummevia-core",
    "lummevia-model-router",
]

[tool.setuptools]
packages = ["lummevia_agents"]
