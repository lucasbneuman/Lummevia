[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "lummevia-persistence"
version = "0.1.0"
description = "Durable operational persistence repositories for Lummevia OS."
requires-python = ">=3.12"
dependencies = [
    "pydantic==2.11.4",
    "sqlalchemy",
    "lummevia-planning",
]

[tool.setuptools]
packages = [
    "lummevia_persistence",
    "lummevia_persistence.repositories",
]
