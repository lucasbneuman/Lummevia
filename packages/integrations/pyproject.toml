[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "lummevia-integrations"
version = "0.1.0"
description = "Integration skeletons for Lummevia OS."
requires-python = ">=3.12"
dependencies = [
    "pydantic==2.11.4",
    "httpx==0.28.1",
    "opentelemetry-sdk==1.38.0",
    "opentelemetry-exporter-otlp-proto-http==1.38.0",
    "lummevia-runtime",
]

[tool.setuptools]
packages = [
    "lummevia_integrations",
    "lummevia_integrations.github",
    "lummevia_integrations.phoenix",
    "lummevia_integrations.youtrack",
]
