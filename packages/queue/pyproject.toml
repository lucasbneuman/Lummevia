[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "lummevia-queue"
version = "0.1.0"
description = "In-memory task queue contracts and orchestration helpers for Lummevia OS."
requires-python = ">=3.12"
dependencies = [
    "pydantic==2.11.4",
    "lummevia-core",
    "lummevia-kilo-adapter",
]

[tool.setuptools]
packages = ["lummevia_queue"]
