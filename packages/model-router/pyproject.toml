[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "lummevia-model-router"
version = "0.1.0"
description = "Model routing package for Lummevia OS."
requires-python = ">=3.12"
dependencies = [
    "pydantic==2.11.4",
]

[tool.setuptools]
packages = ["model_router"]
