[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "lummevia-planning"
version = "0.1.0"
description = "Adaptive planning contracts and deterministic graph mutation proposals for Lummevia OS."
requires-python = ">=3.12"
dependencies = [
    "pydantic==2.11.4",
]

[tool.setuptools]
packages = ["lummevia_planning"]
