[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "lummevia-supervisor"
version = "0.1.0"
description = "In-memory execution supervision and recovery contracts for Lummevia OS."
requires-python = ">=3.12"
dependencies = [
    "pydantic==2.11.4",
    "lummevia-capabilities",
    "lummevia-queue",
    "lummevia-resources",
    "lummevia-sessions",
]

[tool.setuptools]
packages = ["lummevia_supervisor"]
