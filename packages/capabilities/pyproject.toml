[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "lummevia-capabilities"
version = "0.1.0"
description = "In-memory capability registry and allocation guardrails for Lummevia OS."
requires-python = ">=3.12"
dependencies = [
    "pydantic==2.11.4",
    "lummevia-core",
    "lummevia-kilo-adapter",
    "lummevia-model-router",
    "lummevia-queue",
    "lummevia-resources",
]

[tool.setuptools]
packages = ["lummevia_capabilities"]
