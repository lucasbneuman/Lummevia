[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "lummevia-runtime"
version = "0.1.0"
description = "LangGraph runtime orchestration for Lummevia OS."
requires-python = ">=3.12"
dependencies = [
    "pydantic==2.11.4",
    "langgraph==1.1.10",
    "langchain-core==1.3.3",
    "sqlalchemy",
    "psycopg[binary]",
    "lummevia-conversations",
    "lummevia-core",
    "lummevia-kilo-adapter",
    "lummevia-memory",
    "lummevia-queue",
    "lummevia-reviews",
    "lummevia-sessions",
    "lummevia-timeline",
]

[tool.setuptools]
packages = [
    "lummevia_runtime",
    "lummevia_runtime.nodes",
    "lummevia_runtime.persistence",
]
